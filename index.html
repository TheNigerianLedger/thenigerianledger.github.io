<!doctype html>
<html>
 <head><style type="text/css" id="dcoder_stylesheet">/* Core Styles */
body {
  font-family: 'Arial', sans-serif;
  background: #121212;
  color: #e0e0e0;
  line-height: 1.6;
  margin: 0;
  padding: 0;
}

/* Skip Link */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: #1c1c2e;
  color: white;
  padding: 8px;
  z-index: 100;
  transition: top 0.3s;
}

.skip-link:focus {
  top: 0;
}

/* Navigation Bar */
.navbar {
  background: #1c1c2e;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Logo Container */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center; /* center the logo block */
  padding: 5px 15px;
  border-radius: 8px;
  border: 2px solid #008753;
}

/* Container for icons and title (aligned horizontally) with perspective */
.logo-main {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  perspective: 800px; /* enable 3D transforms */
}

/* Logo Icons */
.logo-icons {
  display: inline-flex;
  gap: 5px;
  align-items: center;
  will-change: transform;
}

/* Book Icon: ensure inline-block, set transform-origin, and animate */
.logo-icons .fa-book-open {
  display: inline-block;
  transform-origin: left center; /* Rotate around left edge */
  font-size: 2rem;
  animation: closeOpenBook 2s ease-in-out forwards;
  will-change: transform;
}

/* Magnifier (Emoji Lens): using the emoji directly */
.logo-icons .magnifier {
  display: inline-block;
  font-size: 2rem;
  cursor: pointer;
  will-change: transform;
}

/* Pulse effect for the magnifier when clicked */
.magnifier.pulse {
  animation: magnifyPulse 0.5s ease-in-out;
}

/* Logo Text */
.logo-text {
  font-size: 2rem;
  background: linear-gradient(45deg, #008753 30%, #ffffff 70%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Tagline styling */
.tagline {
  font-size: 0.9rem;
  color: #a97cff;
  margin: 0;
}

/* Navigation Links */
.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-links a {
  color: #d4b2ff;
  text-decoration: none;
  transition: color 0.3s;
}

.nav-links a:hover {
  color: #fff;
}

/* Dropdown Menu */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: #2a2a2a;
  min-width: 200px;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
  z-index: 1;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown-content a {
  color: #e0e0e0;
  padding: 12px 16px;
  display: block;
}

.dropdown-content a:hover {
  background: #3a3a3a;
}

/* Sections */
.section {
  padding: 4rem 2rem;
}

/* Marketplace Grid */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 2rem;
  padding: 2rem;
}

.product-card {
  background: #2a2a2a;
  padding: 1rem;
  border-radius: 8px;
  text-align: center;
}

/* Subscription Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-content {
  background: #1a1a3f;
  padding: 2rem;
  border-radius: 10px;
  text-align: center;
  max-width: 400px;
  border: 2px solid #ff00ff;
}

.popup button {
  background: #ff00ff;
  color: white;
  border: none;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.3s ease;
}

.popup button:hover {
  background: #d100d1;
}

/* Support Section: Buy Me Coffee */
#buy-me-coffee {
  background: #ffeb3b;
  color: #121212 !important;
  padding: 2rem;
  border-radius: 10px;
  margin: 2rem auto;
  max-width: 600px;
  border: 2px solid #f44336;
  text-align: center;
}

#buy-me-coffee h2 {
  color: #f44336 !important;
  margin-bottom: 1rem;
}

.btn-coffee {
  background: #f44336 !important;
  color: white !important;
  padding: 12px 24px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  font-weight: bold;
  transition: transform 0.3s ease;
}

.btn-coffee:hover {
  transform: scale(1.05);
  background: #d32f2f !important;
}

/* Whistleblower Button */
.btn-story {
  background: #008753;
  color: #fff;
  padding: 12px 24px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  font-weight: bold;
  transition: transform 0.3s ease, background 0.3s ease;
  margin-top: 1rem;
}

.btn-story:hover {
  transform: scale(1.05);
  background: #006640;
}

/* Social Media */
.social-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.social-icon {
  color: #d4b2ff;
  font-size: 1.5em;
  transition: all 0.3s ease;
  position: relative;
}

.social-icon:hover,
.social-icon:focus {
  color: #FFD700 !important;
  transform: scale(1.2);
}

.social-icon:active {
  color: #D4AF37 !important;
  transform: scale(0.9);
}

.social-icon::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 2px;
  background: #FFD700;
  bottom: -5px;
  left: 0;
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.social-icon:hover::after {
  transform: scaleX(1);
}

/* Keyframes for the Book Closing and Opening Animation */
@keyframes closeOpenBook {
  0% {
    transform: rotateY(0deg);
  }
  40% {
    transform: rotateY(90deg); /* Book appears closed */
  }
  60% {
    transform: rotateY(90deg); /* Remains closed briefly */
  }
  100% {
    transform: rotateY(0deg); /* Opens again */
  }
}

/* Keyframes for the Magnifying Glass Pulse */
@keyframes magnifyPulse {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.2);
  }
  100% {
    transform: scale(1);
  }
}

/* Keyframes for the Magnifier Dance Animation */
@keyframes dance {
  0% {
    transform: translate(0, 0) rotate(0deg);
  }
  25% {
    transform: translate(10px, -10px) rotate(15deg);
  }
  50% {
    transform: translate(-10px, 10px) rotate(-15deg);
  }
  75% {
    transform: translate(15px, 5px) rotate(10deg);
  }
  100% {
    transform: translate(0, 0) rotate(0deg);
  }
}

.dance-around {
  animation: dance 2s linear infinite !important;
}

/* Media query for users who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

/* Responsive Design */
@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    gap: 1rem;
  }
  
  .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }
}
</style></head> 
 <body> 
  <h1> Hello </h1> 
  <div>
    This is a html example from Dcoder, 
   <br> have fun. :) 
  </div> 
 
<script type="text/javascript" id="dcoder_script">document.addEventListener('DOMContentLoaded', () => {
  // Magnifier animations (for both .magnifier and .hero-magnifier if any)
  const magnifiers = document.querySelectorAll('.magnifier, .hero-magnifier');
  let isDancing = false;

  function startDance() {
    magnifiers.forEach(m => m.classList.add('dance-around'));
    isDancing = true;
    setTimeout(stopDance, 5000);
  }

  function stopDance() {
    magnifiers.forEach(m => m.classList.remove('dance-around'));
    isDancing = false;
  }

  // Start dancing on load
  startDance();

  // Click handler for magnifiers: trigger both the pulse effect and toggle dance
  magnifiers.forEach(magnifier => {
    magnifier.addEventListener('click', function () {
      // Add pulse effect
      this.classList.add('pulse');
      setTimeout(() => this.classList.remove('pulse'), 500);

      if (isDancing) {
        stopDance();
      } else {
        startDance();
      }
      // Also trigger a quick dance animation on click
      this.style.animation = 'dance 0.5s ease-in-out';
      setTimeout(() => {
        this.style.animation = '';
      }, 500);
    });
    // Enable keyboard activation for the magnifier (Enter/Space)
    magnifier.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });
  });

  // Dropdown functionality
  const dropdowns = document.querySelectorAll('.dropdown');
  dropdowns.forEach(dropdown => {
    dropdown.addEventListener('mouseover', () => {
      dropdown.querySelector('.dropdown-content').style.display = 'block';
    });
    dropdown.addEventListener('mouseout', () => {
      dropdown.querySelector('.dropdown-content').style.display = 'none';
    });
  });

  // Subscription popup functionality
  const popup = document.getElementById('subscribe-popup');
  const subscribeBtn = document.getElementById('subscribe-btn');
  const closeBtn = document.getElementById('close-popup');

  function showPopup() {
    if (popup) popup.style.display = 'flex';
  }

  function closePopup() {
    if (popup) popup.style.display = 'none';
  }

  // Show the subscription popup after 5 seconds
  setTimeout(showPopup, 5000);

  if (subscribeBtn) {
    subscribeBtn.addEventListener('click', () => {
      alert('Thank you for subscribing!');
      closePopup();
    });
  }

  if (closeBtn) {
    closeBtn.addEventListener('click', closePopup);
  }

  // Close popup when clicking outside the content area
  if (popup) {
    popup.addEventListener('click', e => {
      if (e.target === popup) closePopup();
    });
  }

  // Close popup on Esc key press
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closePopup();
    }
  });
});
</script></body></html>
