<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nigerian Ledger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        .navbar {
            background: #1c1c2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icons {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo-text {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #008753 30%, #ffffff 70%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Magnifier Animation */
        .magnifier {
            cursor: pointer;
            animation: dance 3s linear infinite;
        }

        /* Dropdown Menu */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #2a2a2a;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            list-style: none;
            padding: 0;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content li a {
            color: #e0e0e0;
            padding: 12px 16px;
            display: block;
            text-decoration: none;
        }

        .dropdown-content li a:hover {
            background: #3a3a3a;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #1c1c2e;
            margin-top: 20px;
        }

        /* Subscription Popup */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-content {
            background: #1a1a3f;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            border: 2px solid #ff00ff;
        }

        .popup button {
            background: #ff00ff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .popup button:hover {
            background: #d100d1;
        }

        /* Magnifier Animation */
        @keyframes dance {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -10px) rotate(15deg); }
            50% { transform: translate(-10px, 10px) rotate(-15deg); }
            75% { transform: translate(15px, 5px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icons">
                <i class="fas fa-book-open"></i> 
                <span class="magnifier">🔍</span> 
            </span>
            <span class="logo-text">The Nigerian Ledger</span>
        </div>
        <ul class="nav-links">
            <li><a href="#fraud-archives">Fraud Archives</a></li>
            <li><a href="#discourse">Discourse Hub</a></li>
            <li><a href="#marketplace">Marketplace</a></li>
            <li class="dropdown">
                <a href="#">About ▼</a>
                <ul class="dropdown-content">
                    <li><a href="#mission">Our Mission</a></li>
                    <li><a href="#press">Press & Features</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- Subscription Popup -->
    <div id="subscribe-popup" class="popup">
        <div class="popup-content">
            <h2>Subscribe to The Nigerian Ledger</h2>
            <p>Stay updated on fraud investigations.</p>
            <button id="subscribe-btn">Subscribe</button>
            <button id="close-popup">Maybe Later</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2025 The Nigerian Ledger by Dabira Awoniyi. All Rights Reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subscription Popup Logic
            const popup = document.getElementById('subscribe-popup');
            setTimeout(() => { popup.style.display = 'flex'; }, 5000);

            document.getElementById('subscribe-btn').addEventListener('click', () => {
                alert("Thank you for subscribing!");
                popup.style.display = 'none';
            });

            document.getElementById('close-popup').addEventListener('click', () => {
                popup.style.display = 'none';
            });

            popup.addEventListener('click', (e) => {
                if (e.target === popup) popup.style.display = 'none';
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') popup.style.display = 'none';
            });
        });
    </script>

</body>
    </html>
